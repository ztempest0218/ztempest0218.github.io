---
layout: page
---

<article class="blog-post">
    <p class="post-date">{{ page.date | date: "%Y/%m/%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="post-description">{{ page.description }}</p>
    {% endif %}
    <div class="post-body">
        {{ content }}
    </div>
</article>

<p class="blog-back"><a href="{{ "/blog/" | prepend: site.baseurl }}">Back to Blog</a></p>
